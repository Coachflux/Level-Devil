<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Devil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3), 0 0 100px rgba(0, 0, 0, 0.5);
            border: 3px solid #e94560;
            border-radius: 4px;
        }

        canvas {
            display: block;
            background: #16213e;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 12px;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
        }

        #ui .deaths {
            color: #e94560;
            margin-top: 5px;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            text-shadow: 3px 3px 0 #000;
        }

        #message h1 {
            font-size: 28px;
            color: #e94560;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        #message p {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }

        #message .blink {
            animation: blink 1s infinite;
            color: #fff;
            margin-top: 20px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        <div id="ui">
            <div>LEVEL: <span id="levelNum">1</span>/8</div>
            <div class="deaths">DEATHS: <span id="deathCount">0</span></div>
        </div>
        <div id="message">
            <h1>LEVEL DEVIL</h1>
            <p>Arrow Keys / WASD to Move & Jump</p>
            <p>Reach the DOOR to escape...</p>
            <p class="blink">PRESS SPACE TO START</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgEl = document.getElementById('message');
        const levelEl = document.getElementById('levelNum');
        const deathEl = document.getElementById('deathCount');

        // Audio context for sound effects
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            if (type === 'jump') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554, now + 0.1);
                osc.frequency.setValueAtTime(659, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'trap') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            }
        }

        // Game state
        let gameState = 'menu'; // menu, playing, dead, levelComplete, gameComplete
        let currentLevel = 0;
        let deaths = 0;
        let frameCount = 0;

        // Input
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (gameState === 'menu' && e.code === 'Space') {
                startGame();
            } else if (gameState === 'dead' && e.code === 'Space') {
                restartLevel();
            } else if (gameState === 'levelComplete' && e.code === 'Space') {
                nextLevel();
            } else if (gameState === 'gameComplete' && e.code === 'Space') {
                resetGame();
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Camera
        let camera = { x: 0, y: 0 };

        // Particles
        let particles = [];

        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1,
                    color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        // Player
        let player = {
            x: 50, y: 300,
            width: 24, height: 24,
            vx: 0, vy: 0,
            speed: 4,
            jumpPower: -10,
            grounded: false,
            facing: 1,
            dead: false,
            respawnX: 50, respawnY: 300
        };

        // Level data
        const TILE = 32;

        function createLevel(data) {
            const platforms = [];
            const spikes = [];
            const fakePlatforms = [];
            const fallingPlatforms = [];
            const movingPlatforms = [];
            const doors = [];
            const triggers = [];
            const hiddenSpikes = [];
            const coins = [];

            const rows = data.map;
            for (let row = 0; row < rows.length; row++) {
                for (let col = 0; col < rows[row].length; col++) {
                    const char = rows[row][col];
                    const x = col * TILE;
                    const y = row * TILE;

                    if (char === '#') platforms.push({ x, y, w: TILE, h: TILE, type: 'normal' });
                    if (char === '=') platforms.push({ x, y, w: TILE, h: TILE, type: 'ice' });
                    if (char === '^') spikes.push({ x, y: y + 16, w: TILE, h: 16 });
                    if (char === 'v') spikes.push({ x, y, w: TILE, h: 16 });
                    if (char === '<') spikes.push({ x: x + 16, y, w: 16, h: TILE });
                    if (char === '>') spikes.push({ x, y, w: 16, h: TILE });
                    if (char === 'F') fakePlatforms.push({ x, y, w: TILE, h: TILE, revealed: false, timer: 0 });
                    if (char === 'D') fallingPlatforms.push({ x, y, w: TILE, h: TILE, falling: false, vy: 0, originalY: y });
                    if (char === 'M') movingPlatforms.push({ x, y, w: TILE * 2, h: TILE, startX: x, endX: x + TILE * 4, speed: 1, dir: 1 });
                    if (char === 'O') doors.push({ x, y, w: TILE, h: TILE * 1.5 });
                    if (char === 'T') triggers.push({ x, y, w: TILE, h: TILE, activated: false, target: 'spikes' });
                    if (char === 'H') hiddenSpikes.push({ x, y: y + 20, w: TILE, h: 12, hidden: true });
                    if (char === 'C') coins.push({ x: x + 8, y: y + 8, w: 16, h: 16, collected: false });
                    if (char === '@') { player.respawnX = x; player.respawnY = y; }
                }
            }

            return { platforms, spikes, fakePlatforms, fallingPlatforms, movingPlatforms, doors, triggers, hiddenSpikes, coins, width: rows[0].length * TILE, height: rows.length * TILE };
        }

        const levelData = [
            // Level 1: The Basics (with a twist)
            {
                map: [
                    "####################",
                    "#..................#",
                    "#..................#",
                    "#..................#",
                    "#..................#",
                    "#..................#",
                    "#..................#",
                    "#..................#",
                    "#...@..............#",
                    "#####..............#",
                    "#....^.............#",
                    "#..####............#",
                    "#..................#",
                    "#......^...........#",
                    "####################"
                ]
            },
            // Level 2: Trust Issues
            {
                map: [
                    "########################",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#..@...................#",
                    "#####..................#",
                    "#....F...F...F.........#",
                    "#......................#",
                    "#......####............#",
                    "#..^...................#",
                    "########################"
                ]
            },
            // Level 3: Falling Faith
            {
                map: [
                    "########################",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#..@...................#",
                    "#####..................#",
                    "#....D...D...D.........#",
                    "#......................#",
                    "#......####............#",
                    "#..............O.......#",
                    "########################"
                ]
            },
            // Level 4: Moving Targets
            {
                map: [
                    "########################",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#..@...................#",
                    "#####..................#",
                    "#....M.................#",
                    "#......................#",
                    "#......####............#",
                    "#..............O.......#",
                    "########################"
                ]
            },
            // Level 5: The Trap
            {
                map: [
                    "########################",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#..@...................#",
                    "#####..................#",
                    "#..........T...........#",
                    "#....#######...........#",
                    "#....H.H.H.............#",
                    "#..............O.......#",
                    "########################"
                ]
            },
            // Level 6: Leap of Faith
            {
                map: [
                    "################################",
                    "#..............................#",
                    "#..............................#",
                    "#..............................#",
                    "#..............................#",
                    "#..............................#",
                    "#..............................#",
                    "#..............................#",
                    "#..@...........................#",
                    "#####..........................#",
                    "#....F.......F.......F.........#",
                    "#..............................#",
                    "#......####....................#",
                    "#..............O...............#",
                    "################################"
                ]
            },
            // Level 7: Devil's Gauntlet
            {
                map: [
                    "####################################",
                    "#..................................#",
                    "#..................................#",
                    "#..................................#",
                    "#..................................#",
                    "#..................................#",
                    "#..................................#",
                    "#..................................#",
                    "#..@...............................#",
                    "#####..............................#",
                    "#....D...M...D.....................#",
                    "#..................................#",
                    "#......####........................#",
                    "#..^.........T.......O.............#",
                    "####################################"
                ]
            },
            // Level 8: The Final Devil
            {
                map: [
                    "########################################",
                    "#......................................#",
                    "#......................................#",
                    "#......................................#",
                    "#......................................#",
                    "#......................................#",
                    "#......................................#",
                    "#......................................#",
                    "#..@...................................#",
                    "#####..................................#",
                    "#....F...D...M...F.....................#",
                    "#......................................#",
                    "#......####............................#",
                    "#..^.........T.......O.................#",
                    "########################################"
                ]
            }
        ];

        let levels = levelData.map(createLevel);
        let currentLevelData = levels[0];

        function startGame() {
            gameState = 'playing';
            msgEl.classList.add('hidden');
            resetPlayer();
            gameLoop();
        }

        function resetPlayer() {
            player.x = player.respawnX;
            player.y = player.respawnY;
            player.vx = 0;
            player.vy = 0;
            player.grounded = false;
            player.dead = false;
        }

        function restartLevel() {
            gameState = 'playing';
            msgEl.classList.add('hidden');
            resetPlayer();
            // Reset level elements
            currentLevelData = levels[currentLevel];
            currentLevelData.fakePlatforms.forEach(p => { p.revealed = false; p.timer = 0; });
            currentLevelData.fallingPlatforms.forEach(p => { p.falling = false; p.vy = 0; p.y = p.originalY; });
            currentLevelData.triggers.forEach(t => t.activated = false);
            currentLevelData.hiddenSpikes.forEach(s => s.hidden = true);
        }

        function nextLevel() {
            currentLevel++;
            if (currentLevel >= levels.length) {
                gameState = 'gameComplete';
                msgEl.innerHTML = '<h1>YOU ESCAPED!</h1><p>You conquered the devil.</p><p class="blink">PRESS SPACE TO PLAY AGAIN</p>';
                msgEl.classList.remove('hidden');
                return;
            }
            currentLevelData = levels[currentLevel];
            levelEl.textContent = currentLevel + 1;
            gameState = 'playing';
            msgEl.classList.add('hidden');
            resetPlayer();
        }

        function resetGame() {
            currentLevel = 0;
            deaths = 0;
            deathEl.textContent = 0;
            levelEl.textContent = 1;
            levels = levelData.map(createLevel);
            currentLevelData = levels[0];
            gameState = 'menu';
            msgEl.innerHTML = '<h1>LEVEL DEVIL</h1><p>Arrow Keys / WASD to Move & Jump</p><p>Reach the DOOR to escape...</p><p class="blink">PRESS SPACE TO START</p>';
            msgEl.classList.remove('hidden');
        }

        function killPlayer() {
            if (player.dead) return;
            player.dead = true;
            deaths++;
            deathEl.textContent = deaths;
            playSound('die');
            createParticles(player.x + player.width/2, player.y + player.height/2, '#e94560', 15);

            setTimeout(() => {
                gameState = 'dead';
                msgEl.innerHTML = '<h1>YOU DIED</h1><p>The devil claims another soul.</p><p class="blink">PRESS SPACE TO RETRY</p>';
                msgEl.classList.remove('hidden');
            }, 500);
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            if (gameState !== 'playing') return;
            frameCount++;

            // Player movement
            let moveSpeed = player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx = -moveSpeed;
                player.facing = -1;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx = moveSpeed;
                player.facing = 1;
            } else {
                player.vx *= 0.8;
            }

            // Jump
            if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.grounded) {
                player.vy = player.jumpPower;
                player.grounded = false;
                playSound('jump');
                createParticles(player.x + player.width/2, player.y + player.height, '#fff', 4);
            }

            // Gravity
            player.vy += 0.5;

            // Apply velocity
            player.x += player.vx;
            player.y += player.vy;

            // World bounds
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > currentLevelData.width) player.x = currentLevelData.width - player.width;
            if (player.y > currentLevelData.height + 100) {
                killPlayer();
                return;
            }

            // Platform collisions
            player.grounded = false;

            // Normal platforms
            currentLevelData.platforms.forEach(plat => {
                if (checkCollision(player, plat)) {
                    // Determine side
                    const overlapX = Math.min(player.x + player.width - plat.x, plat.x + plat.w - player.x);
                    const overlapY = Math.min(player.y + player.height - plat.y, plat.y + plat.h - player.y);

                    if (overlapX < overlapY) {
                        if (player.x < plat.x) player.x = plat.x - player.width;
                        else player.x = plat.x + plat.w;
                        player.vx = 0;
                    } else {
                        if (player.y < plat.y) {
                            player.y = plat.y - player.height;
                            player.vy = 0;
                            player.grounded = true;
                        } else {
                            player.y = plat.y + plat.h;
                            player.vy = 0;
                        }
                    }
                }
            });

            // Fake platforms - reveal when stepped on
            currentLevelData.fakePlatforms.forEach(plat => {
                if (!plat.revealed && checkCollision(player, plat)) {
                    if (player.y + player.height > plat.y && player.y < plat.y + plat.h/2 && player.vy >= 0) {
                        plat.revealed = true;
                        plat.timer = 30;
                        playSound('trap');
                    }
                }
                if (plat.revealed) {
                    plat.timer--;
                    if (plat.timer <= 0) {
                        // Platform disappears
                    } else if (checkCollision(player, plat)) {
                        if (player.y < plat.y) {
                            player.y = plat.y - player.height;
                            player.vy = 0;
                            player.grounded = true;
                        }
                    }
                }
            });

            // Falling platforms
            currentLevelData.fallingPlatforms.forEach(plat => {
                if (!plat.falling && checkCollision(player, plat)) {
                    if (player.y + player.height > plat.y && player.y < plat.y + 5 && player.vy >= 0) {
                        plat.falling = true;
                        playSound('trap');
                    }
                }
                if (plat.falling) {
                    plat.vy += 0.2;
                    plat.y += plat.vy;
                }
                if (checkCollision(player, plat) && !plat.falling) {
                    if (player.y < plat.y) {
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.grounded = true;
                    }
                }
            });

            // Moving platforms
            currentLevelData.movingPlatforms.forEach(plat => {
                plat.x += plat.speed * plat.dir;
                if (plat.x > plat.endX || plat.x < plat.startX) plat.dir *= -1;

                if (checkCollision(player, plat)) {
                    if (player.y < plat.y) {
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.grounded = true;
                        player.x += plat.speed * plat.dir;
                    }
                }
            });

            // Spikes
            currentLevelData.spikes.forEach(spike => {
                const spikeHitbox = { x: spike.x + 4, y: spike.y + 4, w: spike.w - 8, h: spike.h - 8 };
                if (checkCollision(player, spikeHitbox)) {
                    killPlayer();
                }
            });

            // Hidden spikes
            currentLevelData.hiddenSpikes.forEach(spike => {
                if (!spike.hidden) {
                    const spikeHitbox = { x: spike.x + 4, y: spike.y + 4, w: spike.w - 8, h: spike.h - 8 };
                    if (checkCollision(player, spikeHitbox)) {
                        killPlayer();
                    }
                }
            });

            // Triggers
            currentLevelData.triggers.forEach(trig => {
                if (!trig.activated && checkCollision(player, trig)) {
                    trig.activated = true;
                    playSound('trap');
                    // Reveal hidden spikes
                    currentLevelData.hiddenSpikes.forEach(s => {
                        s.hidden = false;
                        createParticles(s.x + s.w/2, s.y, '#e94560', 6);
                    });
                }
            });

            // Coins
            currentLevelData.coins.forEach(coin => {
                if (!coin.collected && checkCollision(player, coin)) {
                    coin.collected = true;
                    playSound('win');
                    createParticles(coin.x + 8, coin.y + 8, '#ffd700', 6);
                }
            });

            // Door
            currentLevelData.doors.forEach(door => {
                if (checkCollision(player, door)) {
                    playSound('win');
                    gameState = 'levelComplete';
                    createParticles(player.x + player.width/2, player.y + player.height/2, '#0f0', 20);
                    msgEl.innerHTML = '<h1>LEVEL CLEAR!</h1><p>The devil is not done with you yet...</p><p class="blink">PRESS SPACE TO CONTINUE</p>';
                    msgEl.classList.remove('hidden');
                }
            });

            // Camera follow
            const targetCamX = player.x - canvas.width / 2 + player.width / 2;
            const targetCamY = player.y - canvas.height / 2 + player.height / 2;
            camera.x += (targetCamX - camera.x) * 0.1;
            camera.y += (targetCamY - camera.y) * 0.1;

            // Clamp camera
            camera.x = Math.max(0, Math.min(camera.x, currentLevelData.width - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, currentLevelData.height - canvas.height));

            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;
                return p.life > 0;
            });
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-Math.floor(camera.x), -Math.floor(camera.y));

            // Draw grid background
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (let x = 0; x < currentLevelData.width; x += TILE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, currentLevelData.height);
                ctx.stroke();
            }
            for (let y = 0; y < currentLevelData.height; y += TILE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(currentLevelData.width, y);
                ctx.stroke();
            }

            // Draw platforms
            currentLevelData.platforms.forEach(plat => {
                ctx.fillStyle = plat.type === 'ice' ? '#a8d8ea' : '#0f3460';
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.strokeStyle = plat.type === 'ice' ? '#7ec8e3' : '#e94560';
                ctx.lineWidth = 2;
                ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);

                // Brick pattern
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                for (let i = 0; i < plat.w; i += 8) {
                    for (let j = 0; j < plat.h; j += 8) {
                        if ((i + j) % 16 === 0) {
                            ctx.fillRect(plat.x + i, plat.y + j, 4, 4);
                        }
                    }
                }
            });

            // Draw fake platforms
            currentLevelData.fakePlatforms.forEach(plat => {
                if (!plat.revealed) {
                    ctx.fillStyle = '#0f3460';
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                    ctx.strokeStyle = '#e94560';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                    // Subtle X pattern
                    ctx.strokeStyle = 'rgba(233, 69, 96, 0.3)';
                    ctx.beginPath();
                    ctx.moveTo(plat.x + 4, plat.y + 4);
                    ctx.lineTo(plat.x + plat.w - 4, plat.y + plat.h - 4);
                    ctx.moveTo(plat.x + plat.w - 4, plat.y + 4);
                    ctx.lineTo(plat.x + 4, plat.y + plat.h - 4);
                    ctx.stroke();
                } else if (plat.timer > 0) {
                    ctx.globalAlpha = plat.timer / 30;
                    ctx.fillStyle = '#e94560';
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                    ctx.globalAlpha = 1;
                }
            });

            // Draw falling platforms
            currentLevelData.fallingPlatforms.forEach(plat => {
                ctx.fillStyle = '#533483';
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 2;
                ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                // Warning cracks
                ctx.strokeStyle = 'rgba(233, 69, 96, 0.5)';
                ctx.beginPath();
                ctx.moveTo(plat.x + 8, plat.y + 8);
                ctx.lineTo(plat.x + 16, plat.y + 16);
                ctx.lineTo(plat.x + 24, plat.y + 10);
                ctx.stroke();
            });

            // Draw moving platforms
            currentLevelData.movingPlatforms.forEach(plat => {
                ctx.fillStyle = '#1a5f7a';
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.strokeStyle = '#57c5b6';
                ctx.lineWidth = 2;
                ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                // Arrow
                ctx.fillStyle = '#57c5b6';
                ctx.beginPath();
                ctx.moveTo(plat.x + plat.w/2, plat.y + 8);
                ctx.lineTo(plat.x + plat.w/2 - 4, plat.y + 20);
                ctx.lineTo(plat.x + plat.w/2 + 4, plat.y + 20);
                ctx.fill();
            });

            // Draw spikes
            ctx.fillStyle = '#e94560';
            currentLevelData.spikes.forEach(spike => {
                const spikeCount = Math.floor(spike.w / 8);
                for (let i = 0; i < spikeCount; i++) {
                    ctx.beginPath();
                    ctx.moveTo(spike.x + i * 8, spike.y + spike.h);
                    ctx.lineTo(spike.x + i * 8 + 4, spike.y);
                    ctx.lineTo(spike.x + i * 8 + 8, spike.y + spike.h);
                    ctx.fill();
                }
            });

            // Draw hidden spikes
            currentLevelData.hiddenSpikes.forEach(spike => {
                if (!spike.hidden) {
                    ctx.fillStyle = '#e94560';
                    const spikeCount = Math.floor(spike.w / 8);
                    for (let i = 0; i < spikeCount; i++) {
                        ctx.beginPath();
                        ctx.moveTo(spike.x + i * 8, spike.y + spike.h);
                        ctx.lineTo(spike.x + i * 8 + 4, spike.y);
                        ctx.lineTo(spike.x + i * 8 + 8, spike.y + spike.h);
                        ctx.fill();
                    }
                }
            });

            // Draw triggers
            currentLevelData.triggers.forEach(trig => {
                ctx.fillStyle = trig.activated ? '#e94560' : '#ffd700';
                ctx.fillRect(trig.x + 8, trig.y + 8, 16, 16);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(trig.x + 8, trig.y + 8, 16, 16);
                if (!trig.activated) {
                    ctx.fillStyle = '#000';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('?', trig.x + 16, trig.y + 21);
                }
            });

            // Draw coins
            currentLevelData.coins.forEach(coin => {
                if (!coin.collected) {
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(coin.x + 8, coin.y + 8, 6 + Math.sin(frameCount * 0.1) * 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            });

            // Draw door
            currentLevelData.doors.forEach(door => {
                ctx.fillStyle = '#2d6a4f';
                ctx.fillRect(door.x, door.y, door.w, door.h);
                ctx.strokeStyle = '#52b788';
                ctx.lineWidth = 3;
                ctx.strokeRect(door.x, door.y, door.w, door.h);
                // Door frame
                ctx.fillStyle = '#1b4332';
                ctx.fillRect(door.x + 4, door.y + 4, door.w - 8, door.h - 4);
                // Handle
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(door.x + door.w - 8, door.y + door.h/2, 3, 0, Math.PI * 2);
                ctx.fill();
                // Glow
                ctx.shadowColor = '#52b788';
                ctx.shadowBlur = 20;
                ctx.strokeRect(door.x, door.y, door.w, door.h);
                ctx.shadowBlur = 0;
            });

            // Draw player
            if (!player.dead) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(player.x, player.y, player.width, player.height);
                // Eyes
                ctx.fillStyle = '#000';
                const eyeOffset = player.facing === 1 ? 4 : -4;
                ctx.fillRect(player.x + 6 + eyeOffset, player.y + 6, 4, 4);
                ctx.fillRect(player.x + 14 + eyeOffset, player.y + 6, 4, 4);
                // Sweat drop when near danger
                ctx.fillStyle = '#a8d8ea';
                ctx.beginPath();
                ctx.arc(player.x + (player.facing === 1 ? 2 : 22), player.y + 4, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;

            ctx.restore();

            // Vignette effect
            const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height/3, canvas.width/2, canvas.height/2, canvas.height);
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function gameLoop() {
            if (gameState === 'menu' || gameState === 'gameComplete') return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
