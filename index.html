<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>Level Devil Mobile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Press Start 2P', cursive;
        }

        #gameWrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
        }

        #gameCanvas {
            display: block;
            background: #16213e;
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #touchControls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 140px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px 20px 20px;
            pointer-events: none;
            z-index: 50;
        }

        .control-group {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .touch-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            transition: all 0.1s;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            cursor: pointer;
        }

        .touch-btn:active, .touch-btn.pressed {
            background: rgba(233, 69, 96, 0.4);
            border-color: #e94560;
            transform: scale(0.92);
        }

        .touch-btn.jump-btn {
            width: 90px;
            height: 90px;
            background: rgba(82, 183, 136, 0.2);
            border-color: rgba(82, 183, 136, 0.5);
            font-size: 18px;
        }

        .touch-btn.jump-btn:active, .touch-btn.jump-btn.pressed {
            background: rgba(82, 183, 136, 0.5);
            border-color: #52b788;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 10px;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
            line-height: 1.8;
        }

        #ui .deaths {
            color: #e94560;
        }

        #messageOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        #messageContent {
            text-align: center;
            padding: 30px 20px;
            max-width: 90%;
        }

        #messageContent h1 {
            font-size: 22px;
            color: #e94560;
            margin-bottom: 16px;
            text-shadow: 3px 3px 0 #000;
            animation: pulse 1.5s infinite;
        }

        #messageContent p {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        #messageContent .blink {
            animation: blink 1s infinite;
            color: #fff;
            margin-top: 16px;
            font-size: 12px;
        }

        .start-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 32px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            pointer-events: auto;
            animation: pulse 1.5s infinite;
            cursor: pointer;
        }

        .start-btn:active {
            transform: scale(0.95);
            background: #ff6b6b;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .hidden { display: none !important; }

        #fullscreenBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 60;
            pointer-events: auto;
            cursor: pointer;
        }

        #fullscreenBtn:active {
            background: rgba(233, 69, 96, 0.3);
        }

        #orientationWarning {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a1a2e;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
            padding: 20px;
        }

        #orientationWarning p {
            color: #e94560;
            font-size: 14px;
            line-height: 2;
        }

        @media (orientation: portrait) and (max-width: 600px) {
            #orientationWarning {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="orientationWarning">
        <p>Please rotate your device<br>to landscape mode<br>for the best experience</p>
    </div>

    <div id="gameWrapper">
        <canvas id="gameCanvas"></canvas>

        <div id="ui">
            <div>LEVEL: <span id="levelNum">1</span>/8</div>
            <div class="deaths">DEATHS: <span id="deathCount">0</span></div>
        </div>

        <button id="fullscreenBtn">&#9974;</button>

        <div id="touchControls" class="hidden">
            <div class="control-group">
                <div class="touch-btn" data-key="ArrowLeft">&#9664;</div>
                <div class="touch-btn" data-key="ArrowRight">&#9654;</div>
            </div>
            <div class="control-group">
                <div class="touch-btn jump-btn" data-key="Space">JUMP</div>
            </div>
        </div>

        <div id="messageOverlay">
            <div id="messageContent">
                <h1>LEVEL DEVIL</h1>
                <p>Touch controls or keyboard</p>
                <p>Reach the DOOR to escape...</p>
                <button class="start-btn" id="startBtn">TAP TO START</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== SETUP ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgOverlay = document.getElementById('messageOverlay');
        const msgContent = document.getElementById('messageContent');
        const levelEl = document.getElementById('levelNum');
        const deathEl = document.getElementById('deathCount');
        const touchControls = document.getElementById('touchControls');
        const startBtn = document.getElementById('startBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Responsive canvas
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 480;

        function resizeCanvas() {
            const wrapper = document.getElementById('gameWrapper');
            const aspect = GAME_WIDTH / GAME_HEIGHT;
            const wrapperAspect = wrapper.clientWidth / wrapper.clientHeight;
            let w, h;
            if (wrapperAspect > aspect) {
                h = wrapper.clientHeight;
                w = h * aspect;
            } else {
                w = wrapper.clientWidth;
                h = w / aspect;
            }
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Fullscreen
        fullscreenBtn.addEventListener('click', function() {
            const el = document.documentElement;
            if (!document.fullscreenElement) {
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        });

        // Audio
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'jump') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554, now + 0.1);
                osc.frequency.setValueAtTime(659, now + 0.2);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'trap') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            }

            if (navigator.vibrate) {
                if (type === 'die') navigator.vibrate([50, 30, 50]);
                else navigator.vibrate(15);
            }
        }

        // ==================== INPUT ====================
        const keys = {};

        document.addEventListener('keydown', function(e) {
            keys[e.code] = true;
            handleAction(e.code);
        });
        document.addEventListener('keyup', function(e) {
            keys[e.code] = false;
        });

        // Touch controls
        const touchBtns = document.querySelectorAll('.touch-btn');
        touchBtns.forEach(function(btn) {
            const key = btn.dataset.key;

            function startHandler(e) {
                if (e.preventDefault) e.preventDefault();
                keys[key] = true;
                btn.classList.add('pressed');
                handleAction(key);
            }
            function endHandler(e) {
                if (e.preventDefault) e.preventDefault();
                keys[key] = false;
                btn.classList.remove('pressed');
            }

            btn.addEventListener('touchstart', startHandler, {passive: false});
            btn.addEventListener('touchend', endHandler, {passive: false});
            btn.addEventListener('touchcancel', endHandler, {passive: false});
            btn.addEventListener('mousedown', startHandler);
            btn.addEventListener('mouseup', endHandler);
            btn.addEventListener('mouseleave', endHandler);
        });

        function handleAction(code) {
            if (gameState === 'menu' && (code === 'Space' || code === 'Enter' || code === 'ArrowUp')) {
                startGame();
            } else if (gameState === 'dead' && (code === 'Space' || code === 'Enter' || code === 'ArrowUp')) {
                restartLevel();
            } else if (gameState === 'levelComplete' && (code === 'Space' || code === 'Enter' || code === 'ArrowUp')) {
                nextLevel();
            } else if (gameState === 'gameComplete' && (code === 'Space' || code === 'Enter' || code === 'ArrowUp')) {
                resetGame();
            }
        }

        // Start button handlers
        function onStartClick(e) {
            if (e && e.stopPropagation) e.stopPropagation();
            startGame();
        }
        startBtn.addEventListener('click', onStartClick);
        startBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            onStartClick();
        }, {passive: false});

        // Prevent default behaviors
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, {passive: false});
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); });

        // ==================== GAME STATE ====================
        let gameState = 'menu';
        let currentLevel = 0;
        let deaths = 0;
        let frameCount = 0;
        let camera = { x: 0, y: 0 };
        let particles = [];
        let animFrameId = null;

        let player = {
            x: 50, y: 300,
            width: 24, height: 24,
            vx: 0, vy: 0,
            speed: 4,
            jumpPower: -10,
            grounded: false,
            facing: 1,
            dead: false,
            respawnX: 50, respawnY: 300
        };

        const TILE = 32;

        // ==================== LEVELS ====================
        function createLevel(data) {
            var platforms = [];
            var spikes = [];
            var fakePlatforms = [];
            var fallingPlatforms = [];
            var movingPlatforms = [];
            var doors = [];
            var triggers = [];
            var hiddenSpikes = [];
            var coins = [];

            var rows = data.map;
            for (var row = 0; row < rows.length; row++) {
                for (var col = 0; col < rows[row].length; col++) {
                    var ch = rows[row][col];
                    var x = col * TILE;
                    var y = row * TILE;

                    if (ch === '#') platforms.push({ x: x, y: y, w: TILE, h: TILE, type: 'normal' });
                    if (ch === '=') platforms.push({ x: x, y: y, w: TILE, h: TILE, type: 'ice' });
                    if (ch === '^') spikes.push({ x: x, y: y + 16, w: TILE, h: 16 });
                    if (ch === 'v') spikes.push({ x: x, y: y, w: TILE, h: 16 });
                    if (ch === '<') spikes.push({ x: x + 16, y: y, w: 16, h: TILE });
                    if (ch === '>') spikes.push({ x: x, y: y, w: 16, h: TILE });
                    if (ch === 'F') fakePlatforms.push({ x: x, y: y, w: TILE, h: TILE, revealed: false, timer: 0 });
                    if (ch === 'D') fallingPlatforms.push({ x: x, y: y, w: TILE, h: TILE, falling: false, vy: 0, originalY: y });
                    if (ch === 'M') movingPlatforms.push({ x: x, y: y, w: TILE * 2, h: TILE, startX: x, endX: x + TILE * 4, speed: 1, dir: 1 });
                    if (ch === 'O') doors.push({ x: x, y: y, w: TILE, h: TILE * 1.5 });
                    if (ch === 'T') triggers.push({ x: x, y: y, w: TILE, h: TILE, activated: false, target: 'spikes' });
                    if (ch === 'H') hiddenSpikes.push({ x: x, y: y + 20, w: TILE, h: 12, hidden: true });
                    if (ch === 'C') coins.push({ x: x + 8, y: y + 8, w: 16, h: 16, collected: false });
                    if (ch === '@') { player.respawnX = x; player.respawnY = y; }
                }
            }

            return { platforms: platforms, spikes: spikes, fakePlatforms: fakePlatforms, fallingPlatforms: fallingPlatforms, movingPlatforms: movingPlatforms, doors: doors, triggers: triggers, hiddenSpikes: hiddenSpikes, coins: coins, width: rows[0].length * TILE, height: rows.length * TILE };
        }

        var levelData = [
            {
                map: [
                    "####################",
                    "#..................#",
                    "#..................#",
                    "#..................#",
                    "#..................#",
                    "#..................#",
                    "#..................#",
                    "#..................#",
                    "#...@..............#",
                    "#####..............#",
                    "#....^.............#",
                    "#..####............#",
                    "#..................#",
                    "#......^...........#",
                    "####################"
                ]
            },
            {
                map: [
                    "########################",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#..@...................#",
                    "#####..................#",
                    "#....F...F...F.........#",
                    "#......................#",
                    "#......####............#",
                    "#..^...................#",
                    "########################"
                ]
            },
            {
                map: [
                    "########################",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#..@...................#",
                    "#####..................#",
                    "#....D...D...D.........#",
                    "#......................#",
                    "#......####............#",
                    "#..............O.......#",
                    "########################"
                ]
            },
            {
                map: [
                    "########################",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#..@...................#",
                    "#####..................#",
                    "#....M.................#",
                    "#......................#",
                    "#......####............#",
                    "#..............O.......#",
                    "########################"
                ]
            },
            {
                map: [
                    "########################",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#......................#",
                    "#..@...................#",
                    "#####..................#",
                    "#..........T...........#",
                    "#....#######...........#",
                    "#....H.H.H.............#",
                    "#..............O.......#",
                    "########################"
                ]
            },
            {
                map: [
                    "################################",
                    "#..............................#",
                    "#..............................#",
                    "#..............................#",
                    "#..............................#",
                    "#..............................#",
                    "#..............................#",
                    "#..............................#",
                    "#..@...........................#",
                    "#####..........................#",
                    "#....F.......F.......F.........#",
                    "#..............................#",
                    "#......####....................#",
                    "#..............O...............#",
                    "################################"
                ]
            },
            {
                map: [
                    "####################################",
                    "#..................................#",
                    "#..................................#",
                    "#..................................#",
                    "#..................................#",
                    "#..................................#",
                    "#..................................#",
                    "#..................................#",
                    "#..@...............................#",
                    "#####..............................#",
                    "#....D...M...D.....................#",
                    "#..................................#",
                    "#......####........................#",
                    "#..^.........T.......O.............#",
                    "####################################"
                ]
            },
            {
                map: [
                    "########################################",
                    "#......................................#",
                    "#......................................#",
                    "#......................................#",
                    "#......................................#",
                    "#......................................#",
                    "#......................................#",
                    "#......................................#",
                    "#..@...................................#",
                    "#####..................................#",
                    "#....F...D...M...F.....................#",
                    "#......................................#",
                    "#......####............................#",
                    "#..^.........T.......O.................#",
                    "########################################"
                ]
            }
        ];

        var levels = [];
        for (var i = 0; i < levelData.length; i++) {
            levels.push(createLevel(levelData[i]));
        }
        var currentLevelData = levels[0];

        // ==================== GAME FUNCTIONS ====================
        function startGame() {
            if (gameState === 'playing') return;
            gameState = 'playing';
            msgOverlay.classList.add('hidden');
            touchControls.classList.remove('hidden');
            resetPlayer();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (animFrameId) cancelAnimationFrame(animFrameId);
            gameLoop();
        }

        function resetPlayer() {
            player.x = player.respawnX;
            player.y = player.respawnY;
            player.vx = 0;
            player.vy = 0;
            player.grounded = false;
            player.dead = false;
        }

        function restartLevel() {
            gameState = 'playing';
            msgOverlay.classList.add('hidden');
            touchControls.classList.remove('hidden');
            resetPlayer();
            currentLevelData = levels[currentLevel];
            for (var i = 0; i < currentLevelData.fakePlatforms.length; i++) {
                currentLevelData.fakePlatforms[i].revealed = false;
                currentLevelData.fakePlatforms[i].timer = 0;
            }
            for (var i = 0; i < currentLevelData.fallingPlatforms.length; i++) {
                currentLevelData.fallingPlatforms[i].falling = false;
                currentLevelData.fallingPlatforms[i].vy = 0;
                currentLevelData.fallingPlatforms[i].y = currentLevelData.fallingPlatforms[i].originalY;
            }
            for (var i = 0; i < currentLevelData.triggers.length; i++) {
                currentLevelData.triggers[i].activated = false;
            }
            for (var i = 0; i < currentLevelData.hiddenSpikes.length; i++) {
                currentLevelData.hiddenSpikes[i].hidden = true;
            }
        }

        function nextLevel() {
            currentLevel++;
            if (currentLevel >= levels.length) {
                gameState = 'gameComplete';
                msgContent.innerHTML = '<h1>YOU ESCAPED!</h1><p>You conquered the devil.</p><p class="blink">TAP TO PLAY AGAIN</p>';
                msgOverlay.classList.remove('hidden');
                touchControls.classList.add('hidden');
                return;
            }
            currentLevelData = levels[currentLevel];
            levelEl.textContent = currentLevel + 1;
            gameState = 'playing';
            msgOverlay.classList.add('hidden');
            touchControls.classList.remove('hidden');
            resetPlayer();
        }

        function resetGame() {
            currentLevel = 0;
            deaths = 0;
            deathEl.textContent = '0';
            levelEl.textContent = '1';
            levels = [];
            for (var i = 0; i < levelData.length; i++) {
                levels.push(createLevel(levelData[i]));
            }
            currentLevelData = levels[0];
            gameState = 'menu';
            msgContent.innerHTML = '<h1>LEVEL DEVIL</h1><p>Touch controls or keyboard</p><p>Reach the DOOR to escape...</p><button class="start-btn" id="startBtn2">TAP TO START</button>';
            msgOverlay.classList.remove('hidden');
            touchControls.classList.add('hidden');

            setTimeout(function() {
                var btn2 = document.getElementById('startBtn2');
                if (btn2) {
                    btn2.addEventListener('click', function(e) { e.stopPropagation(); startGame(); });
                    btn2.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); startGame(); }, {passive: false});
                }
            }, 10);
        }

        function killPlayer() {
            if (player.dead) return;
            player.dead = true;
            deaths++;
            deathEl.textContent = deaths;
            playSound('die');
            createParticles(player.x + player.width/2, player.y + player.height/2, '#e94560', 15);

            setTimeout(function() {
                gameState = 'dead';
                msgContent.innerHTML = '<h1>YOU DIED</h1><p>The devil claims another soul.</p><p class="blink">TAP TO RETRY</p>';
                msgOverlay.classList.remove('hidden');
                touchControls.classList.add('hidden');
            }, 500);
        }

        function createParticles(x, y, color, count) {
            count = count || 8;
            for (var i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.height > rect2.y;
        }

        // ==================== UPDATE ====================
        function update() {
            if (gameState !== 'playing') return;
            frameCount++;

            // Movement
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx = -player.speed;
                player.facing = -1;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx = player.speed;
                player.facing = 1;
            } else {
                player.vx *= 0.8;
            }

            // Jump
            if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.grounded) {
                player.vy = player.jumpPower;
                player.grounded = false;
                playSound('jump');
                createParticles(player.x + player.width/2, player.y + player.height, '#fff', 4);
            }

            // Gravity
            player.vy += 0.5;

            // Apply velocity
            player.x += player.vx;
            player.y += player.vy;

            // World bounds
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > currentLevelData.width) player.x = currentLevelData.width - player.width;
            if (player.y > currentLevelData.height + 100) {
                killPlayer();
                return;
            }

            // Platform collisions
            player.grounded = false;

            for (var i = 0; i < currentLevelData.platforms.length; i++) {
                var plat = currentLevelData.platforms[i];
                if (checkCollision(player, plat)) {
                    var overlapX = Math.min(player.x + player.width - plat.x, plat.x + plat.w - player.x);
                    var overlapY = Math.min(player.y + player.height - plat.y, plat.y + plat.h - player.y);

                    if (overlapX < overlapY) {
                        if (player.x < plat.x) player.x = plat.x - player.width;
                        else player.x = plat.x + plat.w;
                        player.vx = 0;
                    } else {
                        if (player.y < plat.y) {
                            player.y = plat.y - player.height;
                            player.vy = 0;
                            player.grounded = true;
                        } else {
                            player.y = plat.y + plat.h;
                            player.vy = 0;
                        }
                    }
                }
            }

            // Fake platforms
            for (var i = 0; i < currentLevelData.fakePlatforms.length; i++) {
                var plat = currentLevelData.fakePlatforms[i];
                if (!plat.revealed && checkCollision(player, plat)) {
                    if (player.y + player.height > plat.y && player.y < plat.y + plat.h/2 && player.vy >= 0) {
                        plat.revealed = true;
                        plat.timer = 30;
                        playSound('trap');
                    }
                }
                if (plat.revealed && plat.timer > 0) {
                    plat.timer--;
                    if (plat.timer > 0 && checkCollision(player, plat)) {
                        if (player.y < plat.y) {
                            player.y = plat.y - player.height;
                            player.vy = 0;
                            player.grounded = true;
                        }
                    }
                }
            }

            // Falling platforms
            for (var i = 0; i < currentLevelData.fallingPlatforms.length; i++) {
                var plat = currentLevelData.fallingPlatforms[i];
                if (!plat.falling && checkCollision(player, plat)) {
                    if (player.y + player.height > plat.y && player.y < plat.y + 5 && player.vy >= 0) {
                        plat.falling = true;
                        playSound('trap');
                    }
                }
                if (plat.falling) {
                    plat.vy += 0.2;
                    plat.y += plat.vy;
                }
                if (checkCollision(player, plat) && !plat.falling) {
                    if (player.y < plat.y) {
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.grounded = true;
                    }
                }
            }

            // Moving platforms
            for (var i = 0; i < currentLevelData.movingPlatforms.length; i++) {
                var plat = currentLevelData.movingPlatforms[i];
                plat.x += plat.speed * plat.dir;
                if (plat.x > plat.endX || plat.x < plat.startX) plat.dir *= -1;

                if (checkCollision(player, plat)) {
                    if (player.y < plat.y) {
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.grounded = true;
                        player.x += plat.speed * plat.dir;
                    }
                }
            }

            // Spikes
            for (var i = 0; i < currentLevelData.spikes.length; i++) {
                var spike = currentLevelData.spikes[i];
                var spikeHitbox = { x: spike.x + 4, y: spike.y + 4, w: spike.w - 8, h: spike.h - 8 };
                if (checkCollision(player, spikeHitbox)) {
                    killPlayer();
                    return;
                }
            }

            // Hidden spikes
            for (var i = 0; i < currentLevelData.hiddenSpikes.length; i++) {
                var spike = currentLevelData.hiddenSpikes[i];
                if (!spike.hidden) {
                    var spikeHitbox = { x: spike.x + 4, y: spike.y + 4, w: spike.w - 8, h: spike.h - 8 };
                    if (checkCollision(player, spikeHitbox)) {
                        killPlayer();
                        return;
                    }
                }
            }

            // Triggers
            for (var i = 0; i < currentLevelData.triggers.length; i++) {
                var trig = currentLevelData.triggers[i];
                if (!trig.activated && checkCollision(player, trig)) {
                    trig.activated = true;
                    playSound('trap');
                    for (var j = 0; j < currentLevelData.hiddenSpikes.length; j++) {
                        currentLevelData.hiddenSpikes[j].hidden = false;
                        createParticles(currentLevelData.hiddenSpikes[j].x + currentLevelData.hiddenSpikes[j].w/2, currentLevelData.hiddenSpikes[j].y, '#e94560', 6);
                    }
                }
            }

            // Coins
            for (var i = 0; i < currentLevelData.coins.length; i++) {
                var coin = currentLevelData.coins[i];
                if (!coin.collected && checkCollision(player, coin)) {
                    coin.collected = true;
                    playSound('win');
                    createParticles(coin.x + 8, coin.y + 8, '#ffd700', 6);
                }
            }

            // Door
            for (var i = 0; i < currentLevelData.doors.length; i++) {
                var door = currentLevelData.doors[i];
                if (checkCollision(player, door)) {
                    playSound('win');
                    gameState = 'levelComplete';
                    createParticles(player.x + player.width/2, player.y + player.height/2, '#0f0', 20);
                    msgContent.innerHTML = '<h1>LEVEL CLEAR!</h1><p>The devil is not done with you yet...</p><p class="blink">TAP TO CONTINUE</p>';
                    msgOverlay.classList.remove('hidden');
                    touchControls.classList.add('hidden');
                }
            }

            // Camera
            var targetCamX = player.x - canvas.width / 2 + player.width / 2;
            var targetCamY = player.y - canvas.height / 2 + player.height / 2;
            camera.x += (targetCamX - camera.x) * 0.1;
            camera.y += (targetCamY - camera.y) * 0.1;

            camera.x = Math.max(0, Math.min(camera.x, currentLevelData.width - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, currentLevelData.height - canvas.height));

            // Particles
            var newParticles = [];
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;
                if (p.life > 0) newParticles.push(p);
            }
            particles = newParticles;
        }

        // ==================== DRAW ====================
        function draw() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-Math.floor(camera.x), -Math.floor(camera.y));

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (var x = 0; x < currentLevelData.width; x += TILE) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, currentLevelData.height); ctx.stroke();
            }
            for (var y = 0; y < currentLevelData.height; y += TILE) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(currentLevelData.width, y); ctx.stroke();
            }

            // Platforms
            for (var i = 0; i < currentLevelData.platforms.length; i++) {
                var plat = currentLevelData.platforms[i];
                ctx.fillStyle = plat.type === 'ice' ? '#a8d8ea' : '#0f3460';
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.strokeStyle = plat.type === 'ice' ? '#7ec8e3' : '#e94560';
                ctx.lineWidth = 2;
                ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                for (var j = 0; j < plat.w; j += 8) {
                    for (var k = 0; k < plat.h; k += 8) {
                        if ((j + k) % 16 === 0) ctx.fillRect(plat.x + j, plat.y + k, 4, 4);
                    }
                }
            }

            // Fake platforms
            for (var i = 0; i < currentLevelData.fakePlatforms.length; i++) {
                var plat = currentLevelData.fakePlatforms[i];
                if (!plat.revealed) {
                    ctx.fillStyle = '#0f3460';
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                    ctx.strokeStyle = '#e94560';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                    ctx.strokeStyle = 'rgba(233, 69, 96, 0.3)';
                    ctx.beginPath();
                    ctx.moveTo(plat.x + 4, plat.y + 4);
                    ctx.lineTo(plat.x + plat.w - 4, plat.y + plat.h - 4);
                    ctx.moveTo(plat.x + plat.w - 4, plat.y + 4);
                    ctx.lineTo(plat.x + 4, plat.y + plat.h - 4);
                    ctx.stroke();
                } else if (plat.timer > 0) {
                    ctx.globalAlpha = plat.timer / 30;
                    ctx.fillStyle = '#e94560';
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                    ctx.globalAlpha = 1;
                }
            }

            // Falling platforms
            for (var i = 0; i < currentLevelData.fallingPlatforms.length; i++) {
                var plat = currentLevelData.fallingPlatforms[i];
                ctx.fillStyle = '#533483';
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.strokeStyle = '#e94560';
                ctx.lineWidth = 2;
                ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                ctx.strokeStyle = 'rgba(233, 69, 96, 0.5)';
                ctx.beginPath();
                ctx.moveTo(plat.x + 8, plat.y + 8);
                ctx.lineTo(plat.x + 16, plat.y + 16);
                ctx.lineTo(plat.x + 24, plat.y + 10);
                ctx.stroke();
            }

            // Moving platforms
            for (var i = 0; i < currentLevelData.movingPlatforms.length; i++) {
                var plat = currentLevelData.movingPlatforms[i];
                ctx.fillStyle = '#1a5f7a';
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.strokeStyle = '#57c5b6';
                ctx.lineWidth = 2;
                ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                ctx.fillStyle = '#57c5b6';
                ctx.beginPath();
                ctx.moveTo(plat.x + plat.w/2, plat.y + 8);
                ctx.lineTo(plat.x + plat.w/2 - 4, plat.y + 20);
                ctx.lineTo(plat.x + plat.w/2 + 4, plat.y + 20);
                ctx.fill();
            }

            // Spikes
            ctx.fillStyle = '#e94560';
            for (var i = 0; i < currentLevelData.spikes.length; i++) {
                var spike = currentLevelData.spikes[i];
                var spikeCount = Math.floor(spike.w / 8);
                for (var j = 0; j < spikeCount; j++) {
                    ctx.beginPath();
                    ctx.moveTo(spike.x + j * 8, spike.y + spike.h);
                    ctx.lineTo(spike.x + j * 8 + 4, spike.y);
                    ctx.lineTo(spike.x + j * 8 + 8, spike.y + spike.h);
                    ctx.fill();
                }
            }

            // Hidden spikes
            for (var i = 0; i < currentLevelData.hiddenSpikes.length; i++) {
                var spike = currentLevelData.hiddenSpikes[i];
                if (!spike.hidden) {
                    ctx.fillStyle = '#e94560';
                    var spikeCount = Math.floor(spike.w / 8);
                    for (var j = 0; j < spikeCount; j++) {
                        ctx.beginPath();
                        ctx.moveTo(spike.x + j * 8, spike.y + spike.h);
                        ctx.lineTo(spike.x + j * 8 + 4, spike.y);
                        ctx.lineTo(spike.x + j * 8 + 8, spike.y + spike.h);
                        ctx.fill();
                    }
                }
            }

            // Triggers
            for (var i = 0; i < currentLevelData.triggers.length; i++) {
                var trig = currentLevelData.triggers[i];
                ctx.fillStyle = trig.activated ? '#e94560' : '#ffd700';
                ctx.fillRect(trig.x + 8, trig.y + 8, 16, 16);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(trig.x + 8, trig.y + 8, 16, 16);
                if (!trig.activated) {
                    ctx.fillStyle = '#000';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('?', trig.x + 16, trig.y + 21);
                }
            }

            // Coins
            for (var i = 0; i < currentLevelData.coins.length; i++) {
                var coin = currentLevelData.coins[i];
                if (!coin.collected) {
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(coin.x + 8, coin.y + 8, 6 + Math.sin(frameCount * 0.1) * 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }

            // Door
            for (var i = 0; i < currentLevelData.doors.length; i++) {
                var door = currentLevelData.doors[i];
                ctx.fillStyle = '#2d6a4f';
                ctx.fillRect(door.x, door.y, door.w, door.h);
                ctx.strokeStyle = '#52b788';
                ctx.lineWidth = 3;
                ctx.strokeRect(door.x, door.y, door.w, door.h);
                ctx.fillStyle = '#1b4332';
                ctx.fillRect(door.x + 4, door.y + 4, door.w - 8, door.h - 4);
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(door.x + door.w - 8, door.y + door.h/2, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowColor = '#52b788';
                ctx.shadowBlur = 20;
                ctx.strokeRect(door.x, door.y, door.w, door.h);
                ctx.shadowBlur = 0;
            }

            // Player
            if (!player.dead) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillStyle = '#000';
                var eyeOffset = player.facing === 1 ? 4 : -4;
                ctx.fillRect(player.x + 6 + eyeOffset, player.y + 6, 4, 4);
                ctx.fillRect(player.x + 14 + eyeOffset, player.y + 6, 4, 4);
                ctx.fillStyle = '#a8d8ea';
                ctx.beginPath();
                ctx.arc(player.x + (player.facing === 1 ? 2 : 22), player.y + 4, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Particles
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            ctx.restore();

            // Vignette
            var gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height/3, canvas.width/2, canvas.height/2, canvas.height);
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // ==================== GAME LOOP ====================
        function gameLoop() {
            if (gameState === 'menu' || gameState === 'gameComplete') return;
            update();
            draw();
            animFrameId = requestAnimationFrame(gameLoop);
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
